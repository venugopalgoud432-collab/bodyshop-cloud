services:
  - type: web
    name: bodyshop-cloud-v4
    env: node
    plan: starter
    buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: SESSION_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bodyshop-cloud-v4-db
          property: connectionString
      - key: UPLOAD_DIR
        value: "./uploads"
      - key: ENABLE_REAL_NOTIFICATIONS
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: STORAGE_DRIVER
        value: "local"
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: PUBLIC_FILES_BASE_URL
        sync: false

databases:
  - name: bodyshop-cloud-v4-db
    plan: starter
    databaseName: bodyshop_v4
    user: bodyshop_v4_user
