services:
  - type: web
    name: bodyshop-cloud-v4
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bodyshop-cloud-v4-db
          property: connectionString

databases:
  - name: bodyshop-cloud-v4-db
    plan: basic-256mb
    databaseName: bodyshop_v4
    user: bodyshop_v4_user
